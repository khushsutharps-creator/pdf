<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Khush PDF App</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:white;
  overflow:hidden;
}

/* BACKGROUND (DELAYED) */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(45deg,#6366f1,#22c55e,#0ea5e9,#9333ea);
  animation:bgMove 8s linear infinite;
  animation-delay:3s;
  opacity:0;
  animation-fill-mode:forwards;
  z-index:-1;
}

@keyframes bgMove{
  0%{transform:translate(0,0); opacity:1;}
  50%{transform:translate(-25%,-25%);}
  100%{transform:translate(0,0);}
}

/* CARD */
.container{
  width:90%;
  max-width:400px;
  background:rgba(30,41,59,0.75);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(0.9);}
  to{opacity:1;transform:scale(1);}
}

h1{
  font-size:22px;
  margin-bottom:10px;
}

.desc{
  font-size:13px;
  opacity:0.85;
  margin-bottom:15px;
}

/* DROP AREA */
.drop{
  border:2px dashed #aaa;
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
  cursor:pointer;
  transition:0.3s;
}

.drop:hover{
  border-color:#6366f1;
  background:rgba(99,102,241,0.1);
}

/* INPUT */
select,button,input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  background:#6366f1;
  color:white;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  background:#4f46e5;
}

a{
  display:block;
  margin-top:15px;
  color:#22c55e;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  letter-spacing:4px;
  color:#6366f1;

  text-shadow:
    0 0 10px #6366f1,
    0 0 20px #6366f1,
    0 0 40px #6366f1,
    0 0 80px #6366f1;

  animation:introShow 3s ease forwards, glowPulse 1.5s infinite alternate;
}

@keyframes introShow{
  0%{opacity:0;}
  20%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0; visibility:hidden;}
}

@keyframes glowPulse{
  from{text-shadow:0 0 10px #6366f1;}
  to{text-shadow:0 0 40px #6366f1;}
}
</style>
</head>

<body ontouchstart="">

<div id="intro">MADE BY KHUSH</div>

<div class="container">
  <h1>PDF TOOL</h1>

  <div class="desc">
    Ye app students ke liye hai jo apne notes ko kam cost me print karna chahte hain.
    Aap ek sheet par 2 ya 4 pages set karke printing cost kam kar sakte ho.
  </div>

  <div class="drop" id="drop">Upload PDF (Tap or Drag)
    <input type="file" id="file" accept="application/pdf" hidden>
  </div>

  <select id="mode">
    <option value="2">2 Pages per sheet</option>
    <option value="4">4 Pages per sheet</option>
  </select>

  <button onclick="convert()">Convert</button>

  <a id="download" style="display:none;">Download PDF</a>
</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
let file=null;

const drop=document.getElementById("drop");
const input=document.getElementById("file");

drop.onclick=()=>input.click();

input.onchange=e=>{
  file=e.target.files[0];
  drop.innerText=file.name;
};

drop.ondragover=e=>e.preventDefault();

drop.ondrop=e=>{
  e.preventDefault();
  file=e.dataTransfer.files[0];
  drop.innerText=file.name;
};

async function convert(){
  if(!file){alert("Upload PDF first");return;}

  const buffer=await file.arrayBuffer();
  const pdf=await PDFLib.PDFDocument.load(buffer);
  const newPdf=await PDFLib.PDFDocument.create();

  const pages=pdf.getPages();
  const mode=parseInt(document.getElementById("mode").value);

  for(let i=0;i<pages.length;i+=mode){
    const page=newPdf.addPage([842,595]);
    const {width,height}=page.getSize();

    for(let j=0;j<mode;j++){
      if(pages[i+j]){
        const embed=await newPdf.embedPage(pages[i+j]);

        if(mode===2){
          page.drawPage(embed,{x:j*(width/2),y:0,width:width/2,height});
        }else{
          page.drawPage(embed,{x:(j%2)*(width/2),y:j<2?height/2:0,width:width/2,height:height/2});
        }
      }
    }
  }

  const bytes=await newPdf.save();
  const blob=new Blob([bytes],{type:"application/pdf"});
  const url=URL.createObjectURL(blob);

  const link=document.getElementById("download");
  link.href=url;
  link.download="khush.pdf";
  link.style.display="block";
}

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
