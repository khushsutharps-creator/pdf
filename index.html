<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Khush PDF Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  overflow:hidden;
}

/* ?? Animated Background */
body::before {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(45deg,#6366f1,#22c55e,#0ea5e9,#9333ea);
  animation:bgMove 8s linear infinite;
  z-index:-1;
}

@keyframes bgMove {
  0%{transform:translate(0,0);}
  50%{transform:translate(-25%,-25%);}
  100%{transform:translate(0,0);}
}

/* ?? Card */
.container {
  background:rgba(30,41,59,0.7);
  backdrop-filter:blur(20px);
  padding:35px;
  border-radius:20px;
  width:380px;
  text-align:center;
  box-shadow:0 0 50px rgba(0,0,0,0.6);
  animation:fadeIn 1s ease;
}

@keyframes fadeIn {
  from{opacity:0; transform:scale(0.9);}
  to{opacity:1; transform:scale(1);}
}

h1 {
  margin-bottom:10px;
}

/* Hinglish description */
.desc {
  font-size:13px;
  opacity:0.85;
  margin-bottom:15px;
  line-height:1.4;
}

/* Drop Area */
.drop-area {
  border:2px dashed #aaa;
  padding:25px;
  border-radius:15px;
  cursor:pointer;
  margin-bottom:15px;
  transition:0.3s;
}

.drop-area:hover {
  border-color:#6366f1;
  background:rgba(99,102,241,0.1);
}

/* Select */
select {
  padding:8px;
  border-radius:8px;
  margin:10px 0;
}

/* Button */
button {
  margin-top:10px;
  padding:12px 22px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
  cursor:pointer;
  font-size:15px;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
  background:#4f46e5;
}

/* Loader */
.loader {
  display:none;
  margin-top:15px;
}

.progress {
  width:100%;
  height:8px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar {
  height:100%;
  width:0%;
  background:#22c55e;
}

/* ?? STRONG GLOW INTRO */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:36px;
  font-weight:bold;
  z-index:999;
  text-transform:uppercase;
  letter-spacing:5px;

  color:#6366f1;

  /* ?? Strong Glow */
  text-shadow:
    0 0 10px #6366f1,
    0 0 20px #6366f1,
    0 0 40px #6366f1,
    0 0 80px #6366f1;

  animation:fadeOut 2s ease 2s forwards;
}

@keyframes fadeOut {
  to {opacity:0; visibility:hidden;}
}
</style>
</head>

<body>

<div id="intro">MADE BY KHUSH</div>

<div class="container">
  <h1>PDF TOOL</h1>

  <div class="desc">
    Ye tool un students aur logon ke liye hai jo apne notes ko kam cost me print karna chahte hain.
    Is tool ki madad se aap ek sheet par 2 ya 4 pages set karke apni printing cost 50% tak kam kar sakte ho.
  </div>

  <div class="drop-area" id="dropArea">
    Drag & Drop PDF / Click
    <input type="file" id="fileInput" accept="application/pdf" hidden>
  </div>

  <select id="mode">
    <option value="2">2 Pages per sheet</option>
    <option value="4">4 Pages per sheet</option>
  </select>

  <button onclick="processPDF()">Convert</button>

  <div class="loader" id="loader">
    <p>Processing...</p>
    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <a id="download" style="display:none;">DOWNLOAD PDF</a>
</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
let selectedFile=null;

const dropArea=document.getElementById("dropArea");
const fileInput=document.getElementById("fileInput");

dropArea.onclick=()=>fileInput.click();

fileInput.onchange=e=>{
  selectedFile=e.target.files[0];
  dropArea.innerText=selectedFile.name;
};

dropArea.ondrop=e=>{
  e.preventDefault();
  selectedFile=e.dataTransfer.files[0];
  dropArea.innerText=selectedFile.name;
};

dropArea.ondragover=e=>e.preventDefault();

async function processPDF(){
  if(!selectedFile){ alert("Upload PDF first"); return; }

  document.getElementById("loader").style.display="block";
  let progressBar=document.getElementById("progressBar");

  const buffer=await selectedFile.arrayBuffer();
  const pdfDoc=await PDFLib.PDFDocument.load(buffer);
  const newPdf=await PDFLib.PDFDocument.create();

  const pages=pdfDoc.getPages();
  let mode=document.getElementById("mode").value;

  for(let i=0;i<pages.length;i+=parseInt(mode)){
    const page=newPdf.addPage([842,595]);
    const {width,height}=page.getSize();

    for(let j=0;j<mode;j++){
      if(pages[i+j]){
        const embed=await newPdf.embedPage(pages[i+j]);

        let x=(j%2)*(width/2);
        let y=j<2 ? height/2 : 0;

        if(mode==2){
          x=j*(width/2); y=0;
          page.drawPage(embed,{x,y,width:width/2,height});
        } else {
          page.drawPage(embed,{x,y,width:width/2,height:height/2});
        }
      }
    }

    progressBar.style.width=((i/pages.length)*100)+"%";
  }

  const bytes=await newPdf.save();
  const blob=new Blob([bytes],{type:"application/pdf"});
  const url=URL.createObjectURL(blob);

  const link=document.getElementById("download");
  link.href=url;
  link.download="khush-ultimate.pdf";
  link.style.display="block";

  progressBar.style.width="100%";
}
</script>

</body>
</html>
