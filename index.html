<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Khush PDF App</title>

<link rel="manifest" href="manifest.json">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

/* 🔥 SIMPLE SMOOTH BACKGROUND */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(45deg,#6366f1,#22c55e,#0ea5e9);
  animation:bg 12s linear infinite;
  opacity:0;
  z-index:-1;
}

/* Background starts AFTER intro */
body.loaded::before{
  opacity:1;
}

@keyframes bg{
  0%{transform:translate(0,0);}
  50%{transform:translate(-20%,-20%);}
  100%{transform:translate(0,0);}
}

/* CARD */
.container{
  width:90%;
  max-width:380px;
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  text-align:center;
  z-index:1;
}

/* INTRO FIX */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  color:#6366f1;
  z-index:9999;

  animation:intro 3s ease forwards;
}

@keyframes intro{
  0%{opacity:0;}
  20%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0;visibility:hidden;}
}

/* UI */
.drop{
  border:2px dashed #888;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
}

button,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#6366f1;
  color:white;
}
</style>
</head>

<body>

<div id="intro">MADE BY KHUSH</div>

<div class="container">
  <h2>PDF TOOL</h2>

  <div class="drop" id="drop">
    Upload PDF
    <input type="file" id="file" hidden>
  </div>

  <select id="mode">
    <option value="2">2 Pages</option>
    <option value="4">4 Pages</option>
  </select>

  <button onclick="convert()">Convert</button>

  <a id="download" style="display:none;">Download</a>
</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
let file=null;

const drop=document.getElementById("drop");
const input=document.getElementById("file");

drop.onclick=()=>input.click();

input.onchange=e=>{
  file=e.target.files[0];
  drop.innerText=file.name;
};

drop.ondrop=e=>{
  e.preventDefault();
  file=e.dataTransfer.files[0];
  drop.innerText=file.name;
};

drop.ondragover=e=>e.preventDefault();

/* 🔥 FIX: intro ke baad background start */
setTimeout(()=>{
  document.body.classList.add("loaded");
},3000);

async function convert(){
  if(!file){alert("Upload PDF first");return;}

  const buffer=await file.arrayBuffer();
  const pdf=await PDFLib.PDFDocument.load(buffer);
  const newPdf=await PDFLib.PDFDocument.create();

  const pages=pdf.getPages();
  const mode=parseInt(document.getElementById("mode").value);

  for(let i=0;i<pages.length;i+=mode){
    const page=newPdf.addPage([842,595]);
    const {width,height}=page.getSize();

    for(let j=0;j<mode;j++){
      if(pages[i+j]){
        const embed=await newPdf.embedPage(pages[i+j]);

        if(mode===2){
          page.drawPage(embed,{x:j*(width/2),y:0,width:width/2,height});
        }else{
          page.drawPage(embed,{x:(j%2)*(width/2),y:j<2?height/2:0,width:width/2,height:height/2});
        }
      }
    }
  }

  const bytes=await newPdf.save();
  const blob=new Blob([bytes],{type:"application/pdf"});
  const url=URL.createObjectURL(blob);

  const link=document.getElementById("download");
  link.href=url;
  link.download="khush.pdf";
  link.style.display="block";
}

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
