<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- MOBILE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Khush PDF App</title>

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow-x:hidden;
}

/* APP CARD */
.container{
  width:90%;
  max-width:400px;
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* TITLE */
h1{
  font-size:22px;
  margin-bottom:10px;
}

/* DESCRIPTION */
.desc{
  font-size:13px;
  opacity:0.8;
  margin-bottom:15px;
}

/* DROP AREA */
.drop{
  border:2px dashed #555;
  padding:20px;
  border-radius:15px;
  margin-bottom:15px;
  cursor:pointer;
}

.drop.active{
  border-color:#6366f1;
}

/* SELECT + BUTTON */
select,button,input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  background:#6366f1;
  color:white;
}

button:active{
  transform:scale(0.97);
}

/* DOWNLOAD */
a{
  display:block;
  margin-top:15px;
  color:#22c55e;
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  letter-spacing:3px;
  color:#6366f1;
  animation:fade 2s ease 2s forwards;
}

@keyframes fade{
  to{opacity:0;visibility:hidden;}
}
</style>
</head>

<body ontouchstart="">

<div id="intro">MADE BY KHUSH</div>

<div class="container">
  <h1>PDF TOOL</h1>

  <div class="desc">
    Ye app students ke liye hai jo apne notes ko kam cost me print karna chahte hain.
    Aap ek sheet par 2 ya 4 pages set karke printing cost kam kar sakte ho.
  </div>

  <div class="drop" id="drop">Tap ya Drag PDF
    <input type="file" id="file" accept="application/pdf" hidden>
  </div>

  <select id="mode">
    <option value="2">2 Pages per sheet</option>
    <option value="4">4 Pages per sheet</option>
  </select>

  <button onclick="convert()">Convert</button>

  <a id="download" style="display:none;">Download PDF</a>
</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<script>
let file=null;

const drop=document.getElementById("drop");
const input=document.getElementById("file");

drop.onclick=()=>input.click();

input.onchange=e=>{
  file=e.target.files[0];
  drop.innerText=file.name;
};

drop.ondragover=e=>{
  e.preventDefault();
  drop.classList.add("active");
};

drop.ondrop=e=>{
  e.preventDefault();
  file=e.dataTransfer.files[0];
  drop.innerText=file.name;
};

async function convert(){
  if(!file){alert("PDF upload karo");return;}

  const buffer=await file.arrayBuffer();
  const pdf=await PDFLib.PDFDocument.load(buffer);
  const newPdf=await PDFLib.PDFDocument.create();

  const pages=pdf.getPages();
  const mode=parseInt(document.getElementById("mode").value);

  for(let i=0;i<pages.length;i+=mode){
    const page=newPdf.addPage([842,595]);
    const {width,height}=page.getSize();

    for(let j=0;j<mode;j++){
      if(pages[i+j]){
        const embed=await newPdf.embedPage(pages[i+j]);

        if(mode===2){
          page.drawPage(embed,{
            x:j*(width/2),
            y:0,
            width:width/2,
            height:height
          });
        }else{
          page.drawPage(embed,{
            x:(j%2)*(width/2),
            y:j<2?height/2:0,
            width:width/2,
            height:height/2
          });
        }
      }
    }
  }

  const bytes=await newPdf.save();
  const blob=new Blob([bytes],{type:"application/pdf"});
  const url=URL.createObjectURL(blob);

  const link=document.getElementById("download");
  link.href=url;
  link.download="khush.pdf";
  link.style.display="block";
}

/* SERVICE WORKER */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
